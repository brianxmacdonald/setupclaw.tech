<style>
  :root {
    --black: #09090b;
    --surface: #111115;
    --card: #18181c;
    --border: rgba(255,255,255,0.07);
    --coral: #ff4d4d;
    --coral-glow: rgba(255,77,77,0.15);
    --white: #f8f8f6;
    --muted: rgba(248,248,246,0.45);
    --muted-2: rgba(248,248,246,0.65);
    --display: Outfit, system-ui, sans-serif;
    --body: DM Sans, system-ui, sans-serif;
    --mono: SF Mono, JetBrains Mono, Fira Code, monospace;
    --radius: 12px;
    --radius-lg: 20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--body);
    font-size: 18px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px max(5vw, calc((100vw - 1000px) / 2));
    background: rgba(9,9,11,0.82);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--display);
    font-weight: 700;
    font-size: 1.65rem;
    letter-spacing: -0.01em;
    color: var(--white);
    text-decoration: none;
  }
  .logo span { color: var(--coral); }

  .nav-label {
    font-family: var(--mono);
    font-size: 0.79rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 80px 20px 20px;
  }
  .hero h1 {
    font-family: var(--display);
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }
  .hero h1 .accent {
    color: var(--coral);
    text-decoration: underline;
    text-decoration-color: var(--coral-glow);
    text-underline-offset: 4px;
    text-decoration-thickness: 2px;
  }
  .hero p {
    font-family: var(--body);
    font-size: clamp(1rem, 2.5vw, 1.15rem);
    color: var(--muted-2);
    font-weight: 400;
  }

  /* ── CALENDAR ── */
  .calendar-section {
    flex: 1;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 20px 60px;
  }
  .calendar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    overflow: hidden;
  }
  .calendar-card iframe {
    width: 100%;
    min-height: 750px;
    border: none;
    overflow: hidden;
    border-radius: var(--radius);
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 30px 20px;
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
    border-top: 1px solid var(--border);
  }
  .footer a {
    color: var(--muted-2);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer a:hover {
    color: var(--coral);
  }

  @media (max-width: 600px) {
    .hero { padding: 60px 16px 16px; }
    .calendar-card { padding: 12px; border-radius: var(--radius); }
  }
</style>
